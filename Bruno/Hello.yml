info:
  name: Hello
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:8080/hello
  headers:
    - name: Host
      value: localhost:8080
    - name: User-Agent
      value: Mozilla/5.0 (X11; Linux x86_64; rv:148.0) Gecko/20100101 Firefox/148.0
    - name: Accept
      value: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
    - name: Accept-Language
      value: en-US,en;q=0.9
    - name: Accept-Encoding
      value: gzip, deflate, br, zstd
    - name: Connection
      value: keep-alive
    - name: Upgrade-Insecure-Requests
      value: "1"
    - name: Sec-Fetch-Dest
      value: document
    - name: Sec-Fetch-Mode
      value: navigate
    - name: Sec-Fetch-Site
      value: none
    - name: Sec-Fetch-User
      value: ?1
    - name: Priority
      value: u=0, i
    - name: Pragma
      value: no-cache
    - name: Cache-Control
      value: no-cache
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
